<!DOCTYPE html>
<html>
<head>
    <title>Face Detection</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <script defer src="script.js"></script>

    <style>
        body {
            margin: 0;
            display:block;
            justify-content: center;
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
        }
        .wrap {
            position: relative;
            width: 720px;
            height: 560px;
            margin-top: 20px;
        }
        video {
            position: absolute;
        }
        canvas {
            position: absolute;
        }
        #status {
            position: fixed;
            left: 12px;
            top: 12px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #333;
            padding: 8px 10px;
            font-size: 13px;
            max-width: 90vw;
            z-index: 20;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <div id="status">Khoi tao...</div>
    <div class="wrap">
        <video id="video" width="720" height="560" autoplay muted playsinline></video>
    </div>

    <button onclick="saveFace()">Lưu khuôn mặt</button>
    <button onclick="checkFace()">Kiểm tra</button>

    <input type="file" id="imageUpload" accept="image/*">
    <button onclick="compareWithCamera()">So sánh với camera</button>

</body>

</html>
