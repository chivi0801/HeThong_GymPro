<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Điểm danh sinh trắc học</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script defer src="script.js"></script>

<style>
body{
  margin:0;
  background:#0b1120;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:1200px;
  margin-top:30px;
  display:flex;
  gap:30px;
}

.left{
  flex:2;
}

.right{
  flex:1;
  background:#141c2f;
  border-radius:20px;
  padding:20px;
}

.title{
  font-size:28px;
  margin-bottom:20px;
}

.video-box{
  position:relative;
  border-radius:20px;
  overflow:hidden;
}

video{
  width:100%;
  height:auto;
  border-radius:20px;
  display:block;
}

canvas{
  position:absolute;
  width: 100%; ;
  top:0;
  left:0;
}

.info-card{
  text-align:center;
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:auto;
  background:#1f2a44;
  margin-bottom:15px;
}

.button{
  margin-top:15px;
  padding:12px;
  background:linear-gradient(45deg,#6a5af9,#b94bff);
  border:none;
  border-radius:10px;
  color:white;
  width:100%;
  cursor:pointer;
  font-size:16px;
}

.status{
  margin-top:15px;
  text-align:center;
  font-size:14px;
  color:#7dd3fc;
}

input[type="file"]{
  margin-top:15px;
  width:100%;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT SIDE -->
<div class="left">

<div class="title">Điểm danh sinh trắc học</div>

<div class="video-box">
  <video id="video" width="720" height="560" autoplay muted playsinline></video>
</div>

<div class="status" id="status">
Đang khởi động AI...
</div>

</div>

<!-- RIGHT SIDE -->
<div class="right">
<div class="info-card">

<div class="avatar"></div>
<h2>Test nhận diện</h2>

<button class="button" onclick="saveFace()">
Lưu khuôn mặt
</button>

<button class="button" onclick="checkFace()">
So sánh với khuôn mặt đã lưu
</button>

<hr style="margin:20px 0; opacity:0.3">

<input type="file" id="imageUpload" accept="image/*">

<button class="button" onclick="compareWithCamera()">
So sánh ảnh với camera
</button>

</div>
</div>

</div>

</body>
</html>
